# LogFlow: Example Configuration File
# This file illustrates all available configuration options for LogFlow.
# You can use this as a template for your project's logflow.yaml or ~/.config/logflow/config.yaml.

# --- General Settings ---

# Directory where log files will be stored.
# Default: "./logs"
# Env: LOGFLOW_DIR
log_dir: "./logs"

# Base name for the log file (e.g., training.log).
# If omitted, LogFlow will auto-detect the name of the running script.
# Env: LOGFLOW_SCRIPT_NAME
script_name: "my_app"

# Use a background process-safe queue for the file sink.
# Strongly recommended for multiprocess (ML) environments. The queue is
# allocated LAZILY — only when something actually forks/spawns a child
# process — so leaving this on for single-process scripts is free
# (no POSIX semaphore allocated, no resource_tracker spawned).
# Set LOGFLOW_EAGER_ENQUEUE=true to opt out of the laziness and allocate
# at handler-creation time (rarely needed).
# Default: false
# Env: LOGFLOW_ENQUEUE
enqueue: true

# --- Rotation & Retention ---

# Archive the existing log file on script startup by renaming it with a timestamp.
# This ensures every training run gets a fresh log file.
# Default: true
# Env: LOGFLOW_STARTUP_ROTATION
rotation_on_startup: true

# The number of archived log files to keep before deleting the oldest ones.
# Default: 5
# Env: LOGFLOW_RETENTION
retention: 5

# --- Log Levels ---

# Minimum level for logs written to the persistent file.
# Options: TRACE, DEBUG, INFO, SUCCESS, WARNING, ERROR, CRITICAL
# Default: "DEBUG"
# Env: LOGFLOW_FILE_LEVEL
file_level: "DEBUG"

# Minimum level for logs displayed in the console.
# Options: TRACE, DEBUG, INFO, SUCCESS, WARNING, ERROR, CRITICAL
# Default: "INFO"
# Env: LOGFLOW_CONSOLE_LEVEL
console_level: "INFO"

# --- Per-logger, per-sink Level Overrides ---
#
# Override the global file_level / console_level for specific loggers, keyed
# by the calling module's dotted name (matched against loguru's record["name"]).
#
# Matching rules:
#   - Dotted-segment prefix: "pkg.sub" matches "pkg.sub", "pkg.sub.mod", but
#     NOT "pkg.subway". A bare "foo" does not match "foobar.baz".
#   - Longest matching prefix wins (most specific). YAML order is irrelevant.
#
# Per-rule fields (at least one of `console` / `file` is required):
#   console:      Override the console-sink threshold for this logger.
#   file:         Override the file-sink   threshold for this logger.
#   workers_only: If true, the override applies only in non-MainProcess
#                 processes (e.g. PyTorch DataLoader workers). Useful for
#                 silencing noisy first-time discovery logs that each worker
#                 re-emits while keeping the main-process log informative.
#
# Unknown sub-keys and invalid levels raise at startup (no silent ignores).
#
# module_levels:
#   # Demote a chatty logger to WARNING on the file sink, in workers only:
#   "waivefront.rfuav.data.archive":
#     file: WARNING
#     workers_only: true
#
#   # Per-sink split + promotion below the global console_level:
#   "noisy.lib.but.useful.in.debug":
#     console: ERROR    # quiet on screen
#     file: DEBUG       # but keep full detail on disk (below global file_level if any)
#
#   # Longest-prefix-wins example: "pkg.sub" overrides "pkg" for records under pkg.sub.*
#   "pkg":
#     file: WARNING
#   "pkg.sub":
#     file: DEBUG
